<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="35%"  stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="65%"  stop-color="#4c1d95" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonCore" cx="42%" cy="38%" r="45%">
      <stop offset="0%"   stop-color="#e8e8f0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="250" cy="250" r="250" fill="url(#moonGlow)"/>
  <!-- Inner highlight -->
  <circle cx="250" cy="250" r="180" fill="url(#moonCore)"/>
</svg>
