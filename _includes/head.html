<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>
    {%- if page.title and page.title != "Home" -%}
      {{ page.title }} | {{ site.title }}
    {%- else -%}
      {{ site.title }} — {{ site.description }}
    {%- endif -%}
  </title>

  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta name="author" content="{{ site.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 200 }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | prepend: site.baseurl | prepend: site.url }}">

  <!-- Fonts: JetBrains Mono (mono) + Inter (body) — minimal weights -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | prepend: site.baseurl }}">

  <!-- Favicon — moth logo -->
  <link rel="icon" type="image/png" href="{{ '/assets/img/moth-logo.png' | prepend: site.baseurl }}">

  <!-- SEO tag plugin -->
  {%- seo -%}
</head>
